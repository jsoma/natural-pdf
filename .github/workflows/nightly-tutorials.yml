name: Nightly Tutorial Run

on:
  schedule:
    # Run at 2:00 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  execute-tutorials:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Set explicit 2-hour timeout
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Sync dependencies
        run: |
          uv sync --extra all --extra dev

      - name: Register Jupyter kernel for notebooks
        run: |
          uv run python -m ipykernel install --user --name=natural-pdf-project-venv

      - name: Execute notebooks and run tutorial tests
        run: |
          echo "Starting at $(date)"
          uv run nox --non-interactive -s docs
          echo "Completed at $(date)"

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add .
          git commit -m "docs: update executed notebooks [skip ci]" || echo "No changes to commit"
          git push
