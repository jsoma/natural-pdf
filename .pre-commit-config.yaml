repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args: ['--unsafe']
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
  - repo: local
    hooks:
      - id: enforce-uv-run
        name: enforce uv run command policy
        entry: uv run --no-project python scripts/check_uv_run_usage.py
        language: system
        files: ^(CLAUDE\.md|README\.md|docs/.*\.md|scripts/.*\.(md|sh)|\.github/workflows/.*\.ya?ml|tests/test_markdown_docs\.py)$
