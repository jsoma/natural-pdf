site_name: Natural PDF
site_description: A more intuitive interface for working with PDFs
site_url: https://jsoma.github.io/natural-pdf/
repo_url: https://github.com/jsoma/natural-pdf
repo_name: jsoma/natural-pdf
copyright: "&copy; 2023-2025 Jonathan Soma"

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    text: Roboto
    code: SFMono-Regular
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
  language: en

extra_css:
  - assets/stylesheets/custom.css

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation/index.md
    - Choose Your Path: getting-started/choose-your-path.md
    - Quickstart: getting-started/quickstart.md
    - Selectors 101: getting-started/selectors.md
    - Concepts: getting-started/concepts.md
  - Tutorials:
    - 01 Loading PDFs: tutorials/01-loading-and-extraction.ipynb
    - 02 Finding Elements: tutorials/02-finding-elements.ipynb
    - 03 Spatial Navigation: tutorials/08-spatial-navigation.ipynb
    - 04 Tables: tutorials/04-table-extraction.ipynb
    - 05 Exclusions: tutorials/05-excluding-content.ipynb
    - 06 OCR: tutorials/12-ocr-integration.ipynb
    - 07 Layout Analysis: tutorials/07-layout-analysis.ipynb
    - 08 Regions & Flows: tutorials/15-working-with-regions.ipynb
    - 09 Document QA: tutorials/06-document-qa.ipynb
    - 10 Structured Extraction: cookbook/structured-extraction.md
    - 11 Batch Processing: cookbook/batch-processing.md
  - Cookbook:
    - One Page = One Row: cookbook/one-page-one-row.md
    - Label-Value Extraction: cookbook/label-value-extraction.md
    - Guides: cookbook/guides.md
    - Form Cells: cookbook/form-cells.md
    - Messy Tables: cookbook/messy-tables.md
    - Multi-Column Layouts: cookbook/multi-column-layouts.md
    - OCR Then Navigate: cookbook/ocr-then-navigate.md
    - Multipage Content: cookbook/multipage-content.md
    - Finding Sections: cookbook/finding-sections.md
  - Use Cases:
    - Idea Gallery: use-cases/idea-gallery.md
  - Reference:
    - Quick Reference: quick-reference/index.ipynb
    - API: api/index.md
    - Patterns & Pitfalls: for-llms/common-patterns.md
    - Troubleshooting: cookbook/troubleshooting.md

markdown_extensions:
  - pymdownx.highlight:
      pygments_style: solarized-light
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
  - redirects:
      redirect_maps:
        # Old tutorial redirect
        'tutorials/07-working-with-regions.md': 'tutorials/15-working-with-regions.md'
        # Deleted tutorials -> closest remaining tutorial (use .md extension)
        'tutorials/03-extracting-blocks.md': 'tutorials/08-spatial-navigation.md'
        'tutorials/09-section-extraction.md': 'tutorials/15-working-with-regions.md'
        'tutorials/10-form-field-extraction.md': 'tutorials/06-document-qa.md'
        'tutorials/11-enhanced-table-processing.md': 'tutorials/04-table-extraction.md'
        'tutorials/13-semantic-search.md': 'tutorials/06-document-qa.md'
        'tutorials/14-categorizing-documents.md': 'tutorials/06-document-qa.md'
        # How-To Guides -> Tutorials (use .md extension)
        'text-extraction/index.md': 'tutorials/01-loading-and-extraction.md'
        'ocr/index.md': 'tutorials/12-ocr-integration.md'
        'extracting-clean-text/index.md': 'tutorials/05-excluding-content.md'
        'fix-messy-tables/index.md': 'tutorials/04-table-extraction.md'
        'tables/index.md': 'tutorials/04-table-extraction.md'
        'process-forms-and-invoices/index.md': 'tutorials/08-spatial-navigation.md'
        'data-extraction/index.md': 'tutorials/06-document-qa.md'
        'document-qa/index.md': 'tutorials/06-document-qa.md'
        'categorizing-documents/index.md': 'tutorials/06-document-qa.md'
        'element-selection/index.md': 'tutorials/02-finding-elements.md'
        'pdf-navigation/index.md': 'tutorials/01-loading-and-extraction.md'
        'layout-analysis/index.md': 'tutorials/07-layout-analysis.md'
        'regions/index.md': 'tutorials/15-working-with-regions.md'
        'visual-debugging/index.md': 'tutorials/01-loading-and-extraction.md'
        # Extra Fun Features -> Tutorials (use .md extension)
        'interactive-widget/index.md': 'tutorials/01-loading-and-extraction.md'
        'describe/index.md': 'tutorials/02-finding-elements.md'
        'loops-and-groups/index.md': 'cookbook/batch-processing.md'
        'text-analysis/index.md': 'tutorials/02-finding-elements.md'
        'reflowing-pages/index.md': 'tutorials/15-working-with-regions.md'
        'finetuning/index.md': 'tutorials/12-ocr-integration.md'
        # For LLMs consolidation
        'for-llms/anti-patterns.md': 'for-llms/common-patterns.md'
        # Old getting-started index
        'getting-started/index.md': 'getting-started/quickstart.md'
        # Cookbook index
        'cookbook/index.md': 'cookbook/batch-processing.md'
  - mkdocs-jupyter:
      include_source: true
      ignore:
        - "tutorials/*.md"
      execute: false
  - exclude:
      glob:
        - tutorials/*.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: false
            show_category_heading: true
            show_root_heading: true
            show_object_full_path: true
            heading_level: 3
            docstring_style: google
            docstring_options:
              replace_admonitions: true
watch:
  - natural_pdf/
  - docs/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jsoma/natural-pdf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/natural-pdf/
